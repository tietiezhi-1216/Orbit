name: Build Microsoft Store MSIX

on:
  workflow_dispatch:
    inputs:
      identity_name:
        description: Partner Center 的 Package/Identity/Name
        required: true
        type: string
      publisher:
        description: Partner Center 的 Package/Identity/Publisher
        required: true
        type: string
      publisher_display_name:
        description: Partner Center 的 Publisher display name
        required: true
        type: string
      package_version:
        description: 四段式 MSIX 版本号
        required: true
        default: 0.0.1.0
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: desktop/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: microsoft/setup-WinAppCli@v0.1

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned Store MSIX
        shell: pwsh
        env:
          STORE_IDENTITY_NAME: ${{ inputs.identity_name }}
          STORE_PUBLISHER: ${{ inputs.publisher }}
          STORE_PUBLISHER_DISPLAY_NAME: ${{ inputs.publisher_display_name }}
          STORE_PACKAGE_VERSION: ${{ inputs.package_version }}
        run: >-
          ./scripts/build-store-msix.ps1
          -IdentityName $env:STORE_IDENTITY_NAME
          -Publisher $env:STORE_PUBLISHER
          -PublisherDisplayName $env:STORE_PUBLISHER_DISPLAY_NAME
          -PackageVersion $env:STORE_PACKAGE_VERSION

      - name: Upload Store package
        uses: actions/upload-artifact@v4
        with:
          name: tietiezhi-microsoft-store-msix
          path: desktop/store-output/*.msix
          if-no-files-found: error
