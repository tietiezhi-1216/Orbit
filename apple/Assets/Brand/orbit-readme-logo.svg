<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Orbit</title>
  <desc id="desc">Orbit logo with a glowing multimodal core and satellite orbits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061122"/>
      <stop offset="0.52" stop-color="#0A2444"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(206 166) rotate(90) scale(170)">
      <stop stop-color="#2AF4FF" stop-opacity="0.46"/>
      <stop offset="0.42" stop-color="#5BE27B" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="390" y1="77" x2="757" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FFFF"/>
      <stop offset="0.5" stop-color="#8CF8FF"/>
      <stop offset="1" stop-color="#B9FFC8"/>
    </linearGradient>
    <linearGradient id="orbit" x1="73" y1="103" x2="339" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2AF4FF" stop-opacity="0.03"/>
      <stop offset="0.48" stop-color="#2AF4FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5BE27B" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-140%" y="-140%" width="380%" height="380%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="panel"><rect width="1200" height="340" rx="52"/></clipPath>
  </defs>

  <g clip-path="url(#panel)">
    <rect width="1200" height="340" fill="url(#bg)"/>
    <circle cx="206" cy="166" r="210" fill="url(#halo)"/>
    <path d="M1112 0C1032 91 976 188 944 292L930 340H1200V0H1112Z" fill="#5BE27B" fill-opacity="0.05"/>
    <path d="M0 268C113 315 236 337 367 332C539 326 670 282 760 200" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2"/>

    <g filter="url(#shadow)">
      <ellipse cx="206" cy="166" rx="144" ry="54" transform="rotate(-20 206 166)" stroke="url(#orbit)" stroke-width="8"/>
      <ellipse cx="206" cy="166" rx="123" ry="48" transform="rotate(36 206 166)" stroke="#F6B64B" stroke-opacity="0.44" stroke-width="5"/>
      <ellipse cx="206" cy="166" rx="96" ry="37" transform="rotate(83 206 166)" stroke="#8FB1FF" stroke-opacity="0.2" stroke-width="4"/>

      <g filter="url(#glow)">
        <circle cx="328" cy="112" r="13" fill="#2AF4FF"/>
        <circle cx="113" cy="238" r="11" fill="#5BE27B"/>
        <circle cx="262" cy="55" r="9" fill="#F6B64B"/>
      </g>

      <circle cx="206" cy="166" r="67" fill="#061226"/>
      <circle cx="206" cy="166" r="56" fill="#0C3354"/>
      <circle cx="206" cy="166" r="54" stroke="url(#word)" stroke-width="14"/>
      <path d="M164 188C176 170 191 161 207 161C223 161 238 170 250 188" stroke="#C7FFFF" stroke-width="8" stroke-linecap="round"/>
      <path d="M181 185V151M207 197V139M233 185V151" stroke="#E8FFFE" stroke-width="4.5" stroke-linecap="round"/>
    </g>

    <text x="384" y="167" fill="url(#word)" font-family="Avenir Next, Manrope, Montserrat, Helvetica Neue, Arial, sans-serif" font-size="102" font-weight="800" letter-spacing="-4">Orbit</text>
    <text x="389" y="222" fill="#9BB9C7" font-family="Avenir Next, Manrope, Montserrat, Helvetica Neue, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="0.4">Multimodal AI for macOS · every model in shared orbit</text>
    <path d="M391 250H760" stroke="#2AF4FF" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
    <path d="M391 250H548" stroke="#5BE27B" stroke-opacity="0.8" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
