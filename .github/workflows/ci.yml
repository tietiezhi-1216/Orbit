name: CI (macOS)

# 每次推到 main / 提 PR 都在 GitHub 托管的 macOS runner 上构建并组装 .app，
# 验证整套 build.sh release 流程能跑通（CI 上没有自签证书，会自动回落到 ad-hoc 签名）。
# macOS 应用自「平台拆分」后位于 apple/；只在触及 macOS 相关文件时才跑。
on:
  push:
    branches: [main]
    paths: ['apple/**', '.github/workflows/ci.yml']
  pull_request:
    branches: [main]
    paths: ['apple/**', '.github/workflows/ci.yml']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS · release)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apple      # macOS app lives under apple/ since the platform split
    steps:
      - uses: actions/checkout@v4

      # Package.swift 要求 swift-tools 6.0 → 显式选最新稳定 Xcode（含 Swift 6 工具链）。
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version

      - name: Build & assemble app bundle
        run: ./build.sh release

      - name: Verify bundle
        run: |
          BIN="$(swift build -c release --show-bin-path)"
          APP="$BIN/Orbit.app"
          test -x "$APP/Contents/MacOS/Orbit" || { echo "::error::executable missing"; exit 1; }
          test -f "$APP/Contents/Info.plist"  || { echo "::error::Info.plist missing"; exit 1; }
          test -f "$APP/Contents/Resources/Orbit.icns" || { echo "::error::icon missing"; exit 1; }
          echo "bundle OK: $APP"
          codesign -dvv "$APP" 2>&1 | head -n 5 || true
